version: '3'
services:

  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: waseet-gateway-app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./.env
    networks:
      - waseet-net

  # Caddy Web Server (Auto SSL)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: waseet-gateway-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - waseet-net

  # Database Service
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - waseet-net

networks:
  waseet-net:
    driver: bridge

volumes:
  dbdata:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
